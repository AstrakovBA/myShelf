spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/myshelf_db
    username: postgres
    password: your_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate # validate для Flyway, update для быстрой разработки
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    serialization:
      fail-on-empty-beans: false

server:
  port: 8080

# Настройки JWT (пример)
jwt:
  secret: your_super_secret_key_must_be_long_enough_for_hs256
  expiration: 86400000 # 24 часа